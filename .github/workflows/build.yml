name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses:a'z actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
    - name: Setup Android SDK
      run: |
        # Create Android SDK directory structure
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        
        # Download SDK tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O sdk-tools.zip
        unzip -q sdk-tools.zip -d /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/
        mv /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools/* /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
        rm -rf /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools
        rm sdk-tools.zip
        
        # Accept licenses
        yes | /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/home/runner/.buildozer/android/platform/android-sdk --licenses
        
        # Install required components
        /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/home/runner/.buildozer/android/platform/android-sdk "platform-tools" "platforms;android-33" "build-tools;33.0.2"
    - name: Build APK
      run: |
        # Set environment variables
        export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk
        
        # Build APK
        buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk
