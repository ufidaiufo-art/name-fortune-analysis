name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
    - name: Setup Android SDK
      run: |
        # Set Android SDK path
        export ANDROID_HOME="$HOME/Android/Sdk"
        export ANDROID_SDK_ROOT="$HOME/Android/Sdk"
        
        # Create SDK directory
        mkdir -p "$ANDROID_HOME"
        
        # Download SDK tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O sdk-tools.zip
        unzip -q sdk-tools.zip -d "$ANDROID_HOME"
        rm sdk-tools.zip
        
        # Accept licenses
        yes | "$ANDROID_HOME/cmdline-tools/bin/sdkmanager" --sdk_root="$ANDROID_HOME" --licenses
        
        # Install required components
        "$ANDROID_HOME/cmdline-tools/bin/sdkmanager" --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        
        # Add to PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
        echo "$ANDROID_HOME/cmdline-tools/bin" >> $GITHUB_PATH
    - name: Update buildozer.spec
      run: |
        # Update buildozer.spec with correct Android SDK settings
        sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/android.sdk = .*/android.sdk = 33/' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
        sed -i 's/android.buildtools = .*/android.buildtools = 33.0.2/' buildozer.spec
        sed -i 's/android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
        
        # Add Android SDK path to buildozer.spec
        echo "android.sdk_path = $HOME/Android/Sdk" >> buildozer.spec
    - name: Build APK
      run: |
        # Set Android SDK path
        export ANDROID_HOME="$HOME/Android/Sdk"
        export ANDROID_SDK_ROOT="$HOME/Android/Sdk"
        
        # Build APK
        buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk
