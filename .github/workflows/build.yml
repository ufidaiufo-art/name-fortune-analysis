name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_HOME: /home/runner/Android/Sdk
      ANDROID_SDK_ROOT: /home/runner/Android/Sdk
      ANDROID_BUILD_TOOLS_VERSION: 33.0.2
      ANDROID_API_LEVEL: 33
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
    - name: Install Android SDK
      run: |
        # Create Android SDK directory
        mkdir -p $ANDROID_HOME
        
        # Download and install SDK tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O sdk-tools.zip
        unzip -q sdk-tools.zip -d $ANDROID_HOME
        rm sdk-tools.zip
        
        # Set up SDK manager
        yes | $ANDROID_HOME/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses
        $ANDROID_HOME/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS_VERSION}"
    - name: Build APK
      run: buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk
