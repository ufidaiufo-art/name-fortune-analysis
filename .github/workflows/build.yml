name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
    - name: Create buildozer configuration
      run: |
        # Create buildozer.spec with fixed build tools version
        cat > buildozer.spec << 'EOF'
[app]
title = 名字五行分析
package.name = namefortune
package.domain = org.example
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 0.1
requirements = python3,kivy
orientation = portrait

[buildozer]
log_level = 2
warn_on_root = 1

[app:android]
android.api = 33
android.sdk = 33
android.ndk = 25b
android.arch = armeabi-v7a,arm64-v8a
android.buildtools = 33.0.2
android.accept_sdk_license = True
EOF
    - name: Build APK
      run: |
        # Set environment variables for buildozer
        export ANDROID_HOME=/home/runner/Android/Sdk
        export ANDROID_SDK_ROOT=/home/runner/Android/Sdk
        
        # Create Android SDK directory and install tools
        mkdir -p $ANDROID_HOME
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O sdk-tools.zip
        unzip -q sdk-tools.zip -d $ANDROID_HOME
        rm sdk-tools.zip
        
        # Accept licenses and install required components
        yes | $ANDROID_HOME/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses
        $ANDROID_HOME/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        
        # Build APK
        buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk
